name: Skillora CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-deploy-web-and-rules:
    name: Build Web & Deploy to Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting,firestore:rules --project gen-lang-client-0675459682
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

  build-android-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest
    needs: build-deploy-web-and-rules
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies & Build Web
        run: |
          npm ci
          npm run build

      - name: Dynamic Capacitor Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init Skillora com.skillora.app --web-dir dist
          npx cap add android
          npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Skillora-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
